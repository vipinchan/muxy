name: Apply Hotkey Visibility State Fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'feature/dedicated-hotkey-window'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/dedicated-hotkey-window
      - name: Preserve overlay fullscreen across visibility toggles
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('Muxy/Services/Keyboard/HotkeyWindowController.swift')
          text = path.read_text()
          pattern = r'(?m)^\s*if isOverlayFullScreen \{\n\s*exitOverlayFullScreen\(window, animated: false\)\n\s*\}\n'
          updated, count = re.subn(pattern, '', text, count=1)
          if count != 1:
              raise SystemExit(f'Expected one overlay fullscreen exit block, found {count}')
          path.write_text(updated)
          PY
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Muxy/Services/Keyboard/HotkeyWindowController.swift
          git commit -m "fix: preserve hotkey fullscreen state when hidden"
          git push origin HEAD:feature/dedicated-hotkey-window
