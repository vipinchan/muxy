name: Diagnose Full Test Suite

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  tests:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ci/hotkey-test-diagnostics
      - name: Select Xcode
        run: sudo xcode-select -s "/Applications/Xcode_$(grep '^xcode ' .tool-versions | awk '{print $2}').app"
      - name: Setup GhosttyKit
        run: scripts/setup.sh
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Run full tests and capture failures
        run: |
          set +e
          swift test --quiet > /tmp/full-tests.log 2>&1
          status=$?
          set -e

          {
            echo "full_test_exit_code=$status"
            echo "---- explicit test failure lines ----"
            grep -Ei -B 8 -A 20 '(✘|issue recorded|test .* failed|failed after|expectation failed|error:)' /tmp/full-tests.log | tail -n 320 || true
            echo "---- full test tail ----"
            tail -n 180 /tmp/full-tests.log
          } > full-test-diagnostics.txt

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add full-test-diagnostics.txt
          git commit -m "ci: capture full Swift test failure"
          git push origin HEAD:ci/hotkey-test-diagnostics
