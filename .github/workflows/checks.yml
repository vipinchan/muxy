name: Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Checks
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply global hotkey settings wiring
        if: github.head_ref == 'feature/dedicated-hotkey-window'
        run: |
          git fetch origin feature/dedicated-hotkey-window
          git switch -C feature/dedicated-hotkey-window origin/feature/dedicated-hotkey-window
          python3 - <<'PY'
          from pathlib import Path

          path = Path('Muxy/Services/Keyboard/HotkeyWindowController.swift')
          text = path.read_text()
          if 'func handleGlobalHotkeyTrigger(toggleToHide: Bool)' not in text:
              needle = '\n    func show() {'
              index = text.index(needle)
              insertion = '''

    func handleGlobalHotkeyTrigger(toggleToHide: Bool) {
        if isPresented {
            if toggleToHide {
                hide()
            } else {
                window?.orderFrontRegardless()
                window?.makeKeyAndOrderFront(nil)
            }
            return
        }
        show()
    }
'''
              text = text[:index] + insertion + text[index:]
              path.write_text(text)

          path = Path('Muxy/Views/Settings/Shared/SettingsCatalog.swift')
          text = path.read_text()
          if 'key: GlobalHotkeyPreferences.enabledKey' not in text:
              needle = '        SettingsCatalogItem(\n            key: "shortcuts.app",'
              index = text.index(needle)
              insertion = '''        SettingsCatalogItem(
            key: GlobalHotkeyPreferences.enabledKey,
            title: "Enable Global Hotkey",
            description: "Enables the system-wide hotkey workspace trigger.",
            category: .shortcuts,
            section: "Global Hotkey",
            defaultValue: GlobalHotkeyPreferences.defaultEnabled,
            aliases: ["hotkey window", "quick terminal", "double command"]
        ),
        SettingsCatalogItem(
            key: GlobalHotkeyPreferences.triggerKey,
            title: "Global Hotkey Trigger",
            description: "Chooses the modifier-only gesture used to show the hotkey workspace.",
            category: .shortcuts,
            section: "Global Hotkey",
            defaultValue: GlobalHotkeyPreferences.defaultTrigger.rawValue,
            aliases: ["double command", "trigger"]
        ),
        SettingsCatalogItem(
            key: GlobalHotkeyPreferences.doubleTapIntervalMillisecondsKey,
            title: "Double Tap Interval",
            description: "Controls the maximum interval between Command taps in milliseconds.",
            category: .shortcuts,
            section: "Global Hotkey",
            defaultValue: GlobalHotkeyPreferences.defaultDoubleTapIntervalMilliseconds,
            aliases: ["double command", "timing", "milliseconds"]
        ),
        SettingsCatalogItem(
            key: GlobalHotkeyPreferences.toggleToHideKey,
            title: "Toggle to Hide",
            description: "Hides the hotkey workspace when the global hotkey is triggered while it is visible.",
            category: .shortcuts,
            section: "Global Hotkey",
            defaultValue: GlobalHotkeyPreferences.defaultToggleToHide,
            aliases: ["show only", "hide", "toggle"]
        ),
'''
              text = text[:index] + insertion + text[index:]
              path.write_text(text)

          path = Path('Muxy/Services/Persistence/SettingsJSONStore.swift')
          text = path.read_text()
          if 'GlobalHotkeyPreferences.triggerKey: Set(GlobalHotkeyTrigger.allCases.map(\\.rawValue))' not in text:
              needle = r'            ProjectPickerPreferences.storageKey: Set(ProjectPickerMode.allCases.map(\.rawValue)),'
              index = text.index(needle) + len(needle)
              text = text[:index] + '\n            GlobalHotkeyPreferences.triggerKey: Set(GlobalHotkeyTrigger.allCases.map(\\.rawValue)),' + text[index:]

          if 'case GlobalHotkeyPreferences.doubleTapIntervalMillisecondsKey:' not in text:
              function_index = text.index('    private static func validateAllowedDouble')
              needle = '        case TabWidthPreferences.maxWidthKey:'
              index = text.index(needle, function_index)
              insertion = '''        case GlobalHotkeyPreferences.doubleTapIntervalMillisecondsKey:
            guard GlobalHotkeyPreferences.isAllowedDoubleTapIntervalMilliseconds(value) else {
                throw SettingsJSONError.invalidValue(key)
            }
'''
              text = text[:index] + insertion + text[index:]
          path.write_text(text)

          path = Path('Tests/MuxyTests/Services/Persistence/SettingsJSONStoreTests.swift')
          text = path.read_text()
          if 'func globalHotkeySettingsPersistThroughJSON()' not in text:
              needle = '    @Test\n    func prettifiedSettingsTextSortsAndFormatsJSONObject() throws {'
              index = text.index(needle)
              insertion = '''    @Test
    func globalHotkeySettingsPersistThroughJSON() throws {
        let keys = [
            GlobalHotkeyPreferences.enabledKey,
            GlobalHotkeyPreferences.triggerKey,
            GlobalHotkeyPreferences.doubleTapIntervalMillisecondsKey,
            GlobalHotkeyPreferences.toggleToHideKey,
        ]
        let snapshot = SettingsJSONStoreSnapshot.capture(keys: keys)
        defer { snapshot.restore() }

        try SettingsJSONStore.saveUserSettingsText("""
        {
          "\(GlobalHotkeyPreferences.enabledKey)": false,
          "\(GlobalHotkeyPreferences.triggerKey)": "doubleCommand",
          "\(GlobalHotkeyPreferences.doubleTapIntervalMillisecondsKey)": 450,
          "\(GlobalHotkeyPreferences.toggleToHideKey)": false
        }
        """)

        #expect(!GlobalHotkeyPreferences.isEnabled())
        #expect(GlobalHotkeyPreferences.trigger() == .doubleCommand)
        #expect(GlobalHotkeyPreferences.doubleTapIntervalMilliseconds() == 450)
        #expect(!GlobalHotkeyPreferences.toggleToHide())
    }

    @Test
    func globalHotkeySettingsRejectUnsupportedTrigger() throws {
        let snapshot = SettingsJSONStoreSnapshot.capture(keys: [GlobalHotkeyPreferences.triggerKey])
        defer { snapshot.restore() }

        #expect(throws: SettingsJSONError.self) {
            try SettingsJSONStore.saveUserSettingsText("""
            {
              "\(GlobalHotkeyPreferences.triggerKey)": "unsupported"
            }
            """)
        }
    }

    @Test
    func globalHotkeySettingsRejectOutOfRangeInterval() throws {
        let snapshot = SettingsJSONStoreSnapshot.capture(
            keys: [GlobalHotkeyPreferences.doubleTapIntervalMillisecondsKey]
        )
        defer { snapshot.restore() }

        #expect(throws: SettingsJSONError.self) {
            try SettingsJSONStore.saveUserSettingsText("""
            {
              "\(GlobalHotkeyPreferences.doubleTapIntervalMillisecondsKey)": 5000
            }
            """)
        }
    }

'''
              text = text[:index] + insertion + text[index:]
              path.write_text(text)
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Muxy/Services/Keyboard/HotkeyWindowController.swift Muxy/Views/Settings/Shared/SettingsCatalog.swift Muxy/Services/Persistence/SettingsJSONStore.swift Tests/MuxyTests/Services/Persistence/SettingsJSONStoreTests.swift
          if git diff --cached --quiet; then
            echo "Global hotkey settings wiring already applied"
          else
            git commit -m "feat: wire global hotkey settings into runtime and JSON config"
            git push origin HEAD:feature/dedicated-hotkey-window
          fi

      - name: Select Xcode
        run: sudo xcode-select -s "/Applications/Xcode_$(grep '^xcode ' .tool-versions | awk '{print $2}').app"

      - name: Read tool versions
        run: |
          echo "SWIFTFORMAT_VERSION=$(grep '^swiftformat ' .tool-versions | awk '{print $2}')" >> "$GITHUB_ENV"
          echo "SWIFTLINT_VERSION=$(grep '^swiftlint ' .tool-versions | awk '{print $2}')" >> "$GITHUB_ENV"

      - name: Install SwiftFormat
        run: |
          curl -sL "https://github.com/nicklockwood/SwiftFormat/releases/download/$SWIFTFORMAT_VERSION/swiftformat.artifactbundle.zip" -o /tmp/swiftformat.zip
          unzip -o /tmp/swiftformat.zip -d /tmp/swiftformat
          cp /tmp/swiftformat/swiftformat.artifactbundle/swiftformat-$SWIFTFORMAT_VERSION-macos/bin/swiftformat /usr/local/bin/swiftformat
          chmod +x /usr/local/bin/swiftformat
          swiftformat --version

      - name: Install SwiftLint
        run: |
          curl -sL "https://github.com/realm/SwiftLint/releases/download/$SWIFTLINT_VERSION/portable_swiftlint.zip" -o /tmp/swiftlint.zip
          unzip -o /tmp/swiftlint.zip -d /tmp/swiftlint
          cp /tmp/swiftlint/swiftlint /usr/local/bin/swiftlint
          chmod +x /usr/local/bin/swiftlint
          swiftlint version

      - name: Formatting
        run: swiftformat --lint .

      - name: Linting
        run: swiftlint lint --strict --quiet

      - name: Resolve GhosttyKit version
        run: echo "GHOSTTY_TAG=$(gh release list --repo muxy-app/ghostty --limit 1 --json tagName -q '.[0].tagName')" >> "$GITHUB_ENV"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Cache GhosttyKit
        uses: actions/cache@v4
        with:
          path: |
            GhosttyKit.xcframework
            GhosttyKit/ghostty.h
            Muxy/Resources/ghostty
            Muxy/Resources/terminfo
          key: ghosttykit-${{ env.GHOSTTY_TAG }}

      - name: Setup GhosttyKit
        run: scripts/setup.sh
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Restore SPM cache
        id: spm-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-${{ runner.arch }}-

      - name: Build tests
        run: swift build --build-tests --quiet

      - name: Test
        run: swift test --quiet

      - name: Save SPM cache
        if: always() && steps.spm-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: ${{ steps.spm-cache.outputs.cache-primary-key }}
