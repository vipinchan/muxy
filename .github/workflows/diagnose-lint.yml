name: Apply Hotkey Lint Fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  fix:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/dedicated-hotkey-window
      - name: Apply targeted lint fix
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("Muxy/Services/Keyboard/HotkeyWindowController.swift")
          text = path.read_text()
          old = "        isPresented ? hide() : show()\n"
          new = "        if isPresented {\n            hide()\n        } else {\n            show()\n        }\n"
          if old in text:
              path.write_text(text.replace(old, new, 1))
          PY
          rm -f swiftlint-errors.txt
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Muxy/Services/Keyboard/HotkeyWindowController.swift swiftlint-errors.txt
          git commit -m "fix: satisfy SwiftLint for hotkey toggle"
          git push origin HEAD:feature/dedicated-hotkey-window
