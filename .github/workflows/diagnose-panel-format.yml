name: Diagnose Panel Format

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  format:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ci/panel-build-diagnostics
      - name: Install SwiftFormat
        run: |
          SWIFTFORMAT_VERSION=$(grep '^swiftformat ' .tool-versions | awk '{print $2}')
          curl -sL "https://github.com/nicklockwood/SwiftFormat/releases/download/$SWIFTFORMAT_VERSION/swiftformat.artifactbundle.zip" -o /tmp/swiftformat.zip
          unzip -o /tmp/swiftformat.zip -d /tmp/swiftformat
          cp /tmp/swiftformat/swiftformat.artifactbundle/swiftformat-$SWIFTFORMAT_VERSION-macos/bin/swiftformat /usr/local/bin/swiftformat
          chmod +x /usr/local/bin/swiftformat
      - name: Auto-format changed source
        run: |
          swiftformat Muxy/Services/Keyboard/HotkeyWindowController.swift Muxy/Views/Components/Support/AppSidebarBackground.swift
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Muxy/Services/Keyboard/HotkeyWindowController.swift Muxy/Views/Components/Support/AppSidebarBackground.swift
          if git diff --cached --quiet; then
            echo "No formatting changes"
            exit 0
          fi
          git commit -m "ci: capture SwiftFormat output"
          git push origin HEAD:ci/panel-build-diagnostics
