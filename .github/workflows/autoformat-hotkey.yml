name: Autoformat Hotkey Branch

on:
  push:
    branches: [feature/dedicated-hotkey-window]

permissions:
  contents: write

concurrency:
  group: autoformat-hotkey
  cancel-in-progress: true

jobs:
  format:
    runs-on: macos-15
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/dedicated-hotkey-window

      - name: Read SwiftFormat version
        run: echo "SWIFTFORMAT_VERSION=$(grep '^swiftformat ' .tool-versions | awk '{print $2}')" >> "$GITHUB_ENV"

      - name: Install SwiftFormat
        run: |
          curl -sL "https://github.com/nicklockwood/SwiftFormat/releases/download/$SWIFTFORMAT_VERSION/swiftformat.artifactbundle.zip" -o /tmp/swiftformat.zip
          unzip -o /tmp/swiftformat.zip -d /tmp/swiftformat
          cp /tmp/swiftformat/swiftformat.artifactbundle/swiftformat-$SWIFTFORMAT_VERSION-macos/bin/swiftformat /usr/local/bin/swiftformat
          chmod +x /usr/local/bin/swiftformat

      - name: Format and commit
        run: |
          swiftformat Muxy/Services/Keyboard/HotkeyWindowController.swift \
            Muxy/Services/Keyboard/ModifierKeyMonitor.swift \
            Muxy/Services/Keyboard/ShortcutContext.swift \
            Tests/MuxyTests/Services/Keyboard/DoubleCommandTapDetectorTests.swift \
            Tests/MuxyTests/Services/Keyboard/ShortcutContextTests.swift
          if git diff --quiet; then
            echo "No formatting changes needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Muxy/Services/Keyboard/HotkeyWindowController.swift \
            Muxy/Services/Keyboard/ModifierKeyMonitor.swift \
            Muxy/Services/Keyboard/ShortcutContext.swift \
            Tests/MuxyTests/Services/Keyboard/DoubleCommandTapDetectorTests.swift \
            Tests/MuxyTests/Services/Keyboard/ShortcutContextTests.swift
          git commit -m "style: apply SwiftFormat"
          git push origin HEAD:feature/dedicated-hotkey-window
