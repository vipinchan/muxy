name: Apply Overlay Chrome Fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'feature/dedicated-hotkey-window'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/dedicated-hotkey-window
      - name: Preserve Muxy chrome in overlay fullscreen
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('Muxy/Services/Keyboard/HotkeyWindowController.swift')
          text = path.read_text()

          replacements = [
              ('    private var overlayRestoreStyleMask: NSWindow.StyleMask?\n', ''),
              ('        overlayRestoreStyleMask = window.styleMask\n', ''),
              ('''        window.styleMask = [.borderless, .resizable, .nonactivatingPanel]\n        window.isMovable = false\n        window.isMovableByWindowBackground = false\n        window.hasShadow = false\n        applyOverlayFullScreenPresentation(to: window)\n        postFullScreenChange(true, for: window)\n''', '''        window.hasShadow = false\n        applyOverlayFullScreenPresentation(to: window)\n'''),
              ('''        let restoreStyleMask = overlayRestoreStyleMask ?? [\n            .titled,\n            .closable,\n            .miniaturizable,\n            .resizable,\n            .fullSizeContentView,\n            .nonactivatingPanel,\n        ]\n\n''', ''),
              ('        overlayRestoreStyleMask = nil\n', ''),
              ('''        window.styleMask = restoreStyleMask\n        window.hasShadow = overlayRestoreHasShadow\n        configureWindowChrome(window)\n        applyHotkeyPresentation(to: window)\n        postFullScreenChange(false, for: window)\n''', '''        window.hasShadow = overlayRestoreHasShadow\n        applyHotkeyPresentation(to: window)\n'''),
          ]

          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f'Expected overlay chrome anchor not found:\n{old}')
              text = text.replace(old, new, 1)

          path.write_text(text)
          PY
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Muxy/Services/Keyboard/HotkeyWindowController.swift
          git commit -m "fix: preserve Muxy chrome in overlay fullscreen"
          git push origin HEAD:feature/dedicated-hotkey-window
