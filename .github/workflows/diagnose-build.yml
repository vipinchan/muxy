name: Diagnose Current Build

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/dedicated-hotkey-window
      - name: Select Xcode
        run: sudo xcode-select -s "/Applications/Xcode_$(grep '^xcode ' .tool-versions | awk '{print $2}').app"
      - name: Setup GhosttyKit
        run: scripts/setup.sh
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Compare low-concurrency build
        run: |
          swift package clean
          set +e
          swift build --build-tests --quiet --jobs 2 > /tmp/build-jobs2.log 2>&1
          status=$?
          set -e
          {
            echo "jobs2_exit_code=$status"
            echo "---- jobs=2 log tail ----"
            tail -n 120 /tmp/build-jobs2.log
          } > build-concurrency-diagnostics.txt
          if git diff --quiet -- build-concurrency-diagnostics.txt && git ls-files --error-unmatch build-concurrency-diagnostics.txt >/dev/null 2>&1; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add build-concurrency-diagnostics.txt
          git commit -m "ci: capture low-concurrency build result"
          git push origin HEAD:feature/dedicated-hotkey-window
