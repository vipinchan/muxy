name: Diagnose Current Build

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/dedicated-hotkey-window
      - name: Select Xcode
        run: sudo xcode-select -s "/Applications/Xcode_$(grep '^xcode ' .tool-versions | awk '{print $2}').app"
      - name: Setup GhosttyKit
        run: scripts/setup.sh
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Isolate build targets
        run: |
          swift package clean
          set +e
          swift build --target Muxy --quiet > /tmp/muxy-target.log 2>&1
          muxy_status=$?

          swift package clean
          swift build --target MuxyTests --jobs 1 -v > /tmp/tests-target.log 2>&1
          tests_status=$?
          set -e

          {
            echo "muxy_target_exit_code=$muxy_status"
            echo "tests_target_exit_code=$tests_status"
            echo "---- Muxy target tail ----"
            tail -n 80 /tmp/muxy-target.log
            echo "---- MuxyTests target tail ----"
            tail -n 200 /tmp/tests-target.log
            echo "---- recent swift-frontend commands ----"
            grep -n 'swift-frontend' /tmp/tests-target.log | tail -n 30 || true
            echo "---- failure keywords ----"
            grep -Ei -n 'signal|stack dump|killed|fatal|linker|undefined symbol|emit-module|command failed|crash|segmentation|error:' /tmp/tests-target.log | tail -n 120 || true
          } > build-target-diagnostics.txt

          if git diff --quiet -- build-target-diagnostics.txt && git ls-files --error-unmatch build-target-diagnostics.txt >/dev/null 2>&1; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add build-target-diagnostics.txt
          git commit -m "ci: capture isolated build target diagnostics"
          git push origin HEAD:feature/dedicated-hotkey-window
