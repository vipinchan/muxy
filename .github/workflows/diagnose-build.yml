name: Apply Hotkey Build Fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  fix:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/dedicated-hotkey-window
      - name: Apply targeted Swift 6 fix
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("Muxy/Services/Keyboard/HotkeyWindowController.swift")
          text = path.read_text()
          old = '''
    deinit {
        if let fullScreenShortcutMonitor {
            NSEvent.removeMonitor(fullScreenShortcutMonitor)
        }
    }
'''
          if old in text:
              path.write_text(text.replace(old, "", 1))
          PY
          rm -f compile-errors.txt build-errors.txt
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: avoid nonisolated deinit monitor access"
          git push origin HEAD:feature/dedicated-hotkey-window
