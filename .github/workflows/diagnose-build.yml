name: Diagnose Build

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/dedicated-hotkey-window
      - name: Select Xcode
        run: sudo xcode-select -s "/Applications/Xcode_$(grep '^xcode ' .tool-versions | awk '{print $2}').app"
      - name: Setup GhosttyKit
        run: scripts/setup.sh
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Capture build diagnostics
        run: |
          swift build --build-tests --quiet > build-errors.txt 2>&1 || true
          if git diff --quiet -- build-errors.txt && git ls-files --error-unmatch build-errors.txt >/dev/null 2>&1; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add build-errors.txt
          git commit -m "ci: capture Swift build diagnostics"
          git push origin HEAD:feature/dedicated-hotkey-window
