name: Diagnose Current Build

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/dedicated-hotkey-window
      - name: Select Xcode
        run: sudo xcode-select -s "/Applications/Xcode_$(grep '^xcode ' .tool-versions | awk '{print $2}').app"
      - name: Setup GhosttyKit
        run: scripts/setup.sh
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Capture current compiler errors
        run: |
          swift build --build-tests --quiet > /tmp/build.log 2>&1 || true
          grep -E -B 8 -A 12 -n '(^error:|:[0-9]+:[0-9]+: error:)' /tmp/build.log > compile-errors.txt || true
          if git diff --quiet -- compile-errors.txt; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add compile-errors.txt
          git commit -m "ci: capture current Swift compiler errors"
          git push origin HEAD:feature/dedicated-hotkey-window
