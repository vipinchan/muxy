name: Apply Overlay Menu Level Fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'feature/dedicated-hotkey-window'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/dedicated-hotkey-window
      - name: Raise overlay fullscreen above menu bar
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('Muxy/Services/Keyboard/HotkeyWindowController.swift')
          lines = path.read_text().splitlines()

          if not any('overlayFullScreenWindowLevel' in line for line in lines):
              start = next(i for i, line in enumerate(lines) if 'private static let hotkeyWindowLevel' in line)
              end = next(i for i in range(start + 1, len(lines)) if lines[i] == '    )')
              lines[end + 1:end + 1] = [
                  '',
                  '    private static let overlayFullScreenWindowLevel = NSWindow.Level(',
                  '        rawValue: Int(CGWindowLevelForKey(.mainMenuWindow)) + 1',
                  '    )',
              ]

          enter_start = next(i for i, line in enumerate(lines) if 'private func enterOverlayFullScreen' in line)
          enter_end = next(i for i in range(enter_start + 1, len(lines)) if 'private func exitOverlayFullScreen' in lines[i])
          for i in range(enter_start, enter_end):
              if lines[i].strip() == 'applyHotkeyPresentation(to: window)':
                  lines[i] = lines[i].replace('applyHotkeyPresentation', 'applyOverlayFullScreenPresentation')
                  break
          else:
              if not any('applyOverlayFullScreenPresentation(to: window)' in lines[i] for i in range(enter_start, enter_end)):
                  raise SystemExit('Overlay fullscreen presentation call not found')

          if not any('private func applyOverlayFullScreenPresentation' in line for line in lines):
              method_start = next(i for i, line in enumerate(lines) if 'private func applyHotkeyPresentation' in line)
              method_end = next(i for i in range(method_start + 1, len(lines)) if lines[i] == '    }')
              lines[method_end + 1:method_end + 1] = [
                  '',
                  '    private func applyOverlayFullScreenPresentation(to window: NSWindow) {',
                  '        window.collectionBehavior = Self.hotkeyCollectionBehavior',
                  '        window.level = Self.overlayFullScreenWindowLevel',
                  '    }',
              ]

          path.write_text('\n'.join(lines) + '\n')
          PY
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Muxy/Services/Keyboard/HotkeyWindowController.swift
          if git diff --cached --quiet; then
            echo "No patch changes"
            exit 0
          fi
          git commit -m "fix: cover menu bar in overlay fullscreen"
          git push origin HEAD:feature/dedicated-hotkey-window
