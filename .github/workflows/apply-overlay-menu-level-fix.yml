name: Apply Overlay Menu Level Fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'feature/dedicated-hotkey-window'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/dedicated-hotkey-window
      - name: Raise overlay fullscreen above menu bar
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('Muxy/Services/Keyboard/HotkeyWindowController.swift')
          text = path.read_text()

          level_anchor = '''    private static let hotkeyWindowLevel = NSWindow.Level(
              rawValue: Int(CGWindowLevelForKey(.mainMenuWindow)) - 2
          )
          '''
          level_replacement = '''    private static let hotkeyWindowLevel = NSWindow.Level(
              rawValue: Int(CGWindowLevelForKey(.mainMenuWindow)) - 2
          )

          private static let overlayFullScreenWindowLevel = NSWindow.Level(
              rawValue: Int(CGWindowLevelForKey(.mainMenuWindow)) + 1
          )
          '''
          if 'overlayFullScreenWindowLevel' not in text:
              if level_anchor not in text:
                  raise SystemExit('Expected hotkeyWindowLevel anchor not found')
              text = text.replace(level_anchor, level_replacement, 1)

          enter_anchor = '''        window.hasShadow = false
          applyHotkeyPresentation(to: window)
          postFullScreenChange(true, for: window)
          '''
          enter_replacement = '''        window.hasShadow = false
          applyOverlayFullScreenPresentation(to: window)
          postFullScreenChange(true, for: window)
          '''
          if enter_anchor in text:
              text = text.replace(enter_anchor, enter_replacement, 1)
          elif 'applyOverlayFullScreenPresentation(to: window)' not in text:
              raise SystemExit('Expected overlay fullscreen presentation anchor not found')

          method_anchor = '''    private func applyHotkeyPresentation(to window: NSWindow) {
              window.collectionBehavior = Self.hotkeyCollectionBehavior
              window.level = Self.hotkeyWindowLevel
          }
          '''
          method_replacement = '''    private func applyHotkeyPresentation(to window: NSWindow) {
              window.collectionBehavior = Self.hotkeyCollectionBehavior
              window.level = Self.hotkeyWindowLevel
          }

          private func applyOverlayFullScreenPresentation(to window: NSWindow) {
              window.collectionBehavior = Self.hotkeyCollectionBehavior
              window.level = Self.overlayFullScreenWindowLevel
          }
          '''
          if 'private func applyOverlayFullScreenPresentation' not in text:
              if method_anchor not in text:
                  raise SystemExit('Expected applyHotkeyPresentation anchor not found')
              text = text.replace(method_anchor, method_replacement, 1)

          path.write_text(text)
          PY
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Muxy/Services/Keyboard/HotkeyWindowController.swift
          if git diff --cached --quiet; then
            echo "No patch changes"
            exit 0
          fi
          git commit -m "fix: cover menu bar in overlay fullscreen"
          git push origin HEAD:feature/dedicated-hotkey-window
